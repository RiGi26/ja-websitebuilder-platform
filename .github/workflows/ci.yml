name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Typecheck & Render Tests
    runs-on: ubuntu-latest
    env:
      # playwright is a local-only UAT tool (scripts/shoot-themes.mjs); CI never
      # launches a browser, so skip the ~100MB chromium download on npm ci.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Render snapshot tests (F5-4)
        run: npm test

  notify-failure:
    name: Notify on master CI failure (WhatsApp)
    needs: test
    if: failure() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Kirim alert WhatsApp via Fonnte
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          ALERT_WA: ${{ vars.ALERT_WA }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$FONNTE_TOKEN" ] || [ -z "$ALERT_WA" ]; then
            echo "FONNTE_TOKEN / ALERT_WA belum di-set di repo Settings - lewati alert (tak menggagalkan workflow)."
            exit 0
          fi
          SHORT=$(echo "$SHA" | cut -c1-7)
          MSG="[CI MERAH] master $REPO@$SHORT gagal. Run: $RUN_URL"
          curl -s -X POST https://api.fonnte.com/send \
            -H "Authorization: $FONNTE_TOKEN" \
            --data-urlencode "target=$ALERT_WA" \
            --data-urlencode "message=$MSG"
