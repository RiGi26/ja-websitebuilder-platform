name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Typecheck & Render Tests
    runs-on: ubuntu-latest
    env:
      # playwright is a local-only UAT tool (scripts/shoot-themes.mjs); CI never
      # launches a browser, so skip the ~100MB chromium download on npm ci.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Render snapshot tests (F5-4)
        run: npm test
